syntax = "proto3";

package course;
option go_package = "github.com/studed/shared/proto/gen/go/course;coursepb";

import "auth/auth.proto";

enum CourseStatus {
  COURSE_STATUS_UNSPECIFIED = 0;
  COURSE_STATUS_DRAFT = 1;
  COURSE_STATUS_PUBLISHED = 2;
}

enum Difficulty {
  DIFFICULTY_UNSPECIFIED = 0;
  DIFFICULTY_EASY = 1;
  DIFFICULTY_MEDIUM = 2;
  DIFFICULTY_HARD = 3;
}

message Course {
  string id = 1;
  string title = 2;
  string description = 3;
  string slug = 4;
  auth.Grade grade_level = 5;
  string educator_id = 6;
  double price = 7;
  CourseStatus status = 8;
  int64 created_at_unix = 9;
  int64 updated_at_unix = 10;
}

message Lesson {
  string id = 1;
  string course_id = 2;
  string title = 3;
  int32 sequence_order = 4;
  bool is_published = 5;
  int64 created_at_unix = 6;
  int64 updated_at_unix = 7;
}

message Wave {
  string id = 1;
  string lesson_id = 2;
  string title = 3;
  int32 sequence_order = 4;
  int32 xp_reward = 5;
  int32 max_reattempts = 6;
  int32 passing_threshold = 7;
  int32 estimated_duration = 8;
  Difficulty difficulty = 9;
  string learn_blocks_json = 10;
  string evaluate_blocks_json = 11;
  bool is_published = 12;
  int64 created_at_unix = 13;
  int64 updated_at_unix = 14;
}

message CreateCourseRequest {
  string title = 1;
  string description = 2;
  string slug = 3;
  auth.Grade grade_level = 4;
  double price = 5;
  string educator_id = 6;
}

message GetCourseRequest {
  string id = 1;
}

message ListCoursesRequest {
  auth.Grade grade_level = 1;
  bool published_only = 2;
  string educator_id = 3;
}

message PublishCourseRequest {
  string id = 1;
  string educator_id = 2;
}

message UpdateCourseRequest {
  string id = 1;
  string educator_id = 2;
  string title = 3;
  string description = 4;
  string slug = 5;
  auth.Grade grade_level = 6;
  double price = 7;
}

message CourseResponse {
  Course course = 1;
  string error = 2;
}

message CourseListResponse {
  repeated Course courses = 1;
}

message CreateLessonRequest {
  string course_id = 1;
  string title = 2;
  int32 sequence_order = 3;
  string educator_id = 4;
}

message GetLessonRequest {
  string id = 1;
}

message ListLessonsRequest {
  string course_id = 1;
  bool published_only = 2;
}

message PublishLessonRequest {
  string id = 1;
  string educator_id = 2;
}

message UpdateLessonRequest {
  string id = 1;
  string educator_id = 2;
  string title = 3;
  int32 sequence_order = 4;
}

message LessonResponse {
  Lesson lesson = 1;
  string error = 2;
}

message LessonListResponse {
  repeated Lesson lessons = 1;
}

message CreateWaveRequest {
  string lesson_id = 1;
  string title = 2;
  int32 sequence_order = 3;
  int32 xp_reward = 4;
  int32 max_reattempts = 5;
  int32 passing_threshold = 6;
  int32 estimated_duration = 7;
  Difficulty difficulty = 8;
  string learn_blocks_json = 9;
  string evaluate_blocks_json = 10;
  string educator_id = 11;
}

message GetWaveRequest {
  string id = 1;
}

message ListWavesRequest {
  string lesson_id = 1;
  bool published_only = 2;
}

message ListWavesByLessonIdsRequest {
  repeated string lesson_ids = 1;
  bool published_only = 2;
}

message UpdateWaveRequest {
  string id = 1;
  string title = 2;
  int32 sequence_order = 3;
  int32 xp_reward = 4;
  int32 max_reattempts = 5;
  int32 passing_threshold = 6;
  int32 estimated_duration = 7;
  Difficulty difficulty = 8;
  string learn_blocks_json = 9;
  string evaluate_blocks_json = 10;
  string educator_id = 11;
}

message PublishWaveRequest {
  string id = 1;
  string educator_id = 2;
}

message WaveResponse {
  Wave wave = 1;
  string error = 2;
}

message WaveListResponse {
  repeated Wave waves = 1;
}

service CourseService {
  rpc CreateCourse(CreateCourseRequest) returns (CourseResponse);
  rpc GetCourse(GetCourseRequest) returns (CourseResponse);
  rpc ListCourses(ListCoursesRequest) returns (CourseListResponse);
  rpc UpdateCourse(UpdateCourseRequest) returns (CourseResponse);
  rpc PublishCourse(PublishCourseRequest) returns (CourseResponse);

  rpc CreateLesson(CreateLessonRequest) returns (LessonResponse);
  rpc GetLesson(GetLessonRequest) returns (LessonResponse);
  rpc ListLessons(ListLessonsRequest) returns (LessonListResponse);
  rpc UpdateLesson(UpdateLessonRequest) returns (LessonResponse);
  rpc PublishLesson(PublishLessonRequest) returns (LessonResponse);

  rpc CreateWave(CreateWaveRequest) returns (WaveResponse);
  rpc GetWave(GetWaveRequest) returns (WaveResponse);
  rpc ListWaves(ListWavesRequest) returns (WaveListResponse);
  rpc ListWavesByLessonIds(ListWavesByLessonIdsRequest) returns (WaveListResponse);
  rpc UpdateWave(UpdateWaveRequest) returns (WaveResponse);
  rpc PublishWave(PublishWaveRequest) returns (WaveResponse);
}
