syntax = "proto3";

package progress;
option go_package = "github.com/studed/shared/proto/gen/go/progress;progresspb";

message Enrollment {
  string id = 1;
  string user_id = 2;
  string course_id = 3;
  int64 enrolled_at_unix = 4;
}

message EnrollRequest {
  string user_id = 1;
  string course_id = 2;
}

message EnrollResponse {
  Enrollment enrollment = 1;
  string error = 2;
}

message Answer {
  string evaluate_block_id = 1;
  string answer = 2;
}

message RecordAttemptRequest {
  string user_id = 1;
  string wave_id = 2;
  repeated Answer answers = 3;
}

message QuestionFeedback {
  string evaluate_block_id = 1;
  bool correct = 2;
  string correct_answer = 3;
  string explanation = 4;
}

message RecordAttemptResponse {
  string attempt_id = 1;
  int32 score = 2;
  bool passed = 3;
  int32 xp_earned = 4;
  int32 total_xp = 5;
  int32 remaining_attempts = 6;
  repeated QuestionFeedback feedback = 7;
  string error = 8;
}

message GetWaveProgressRequest {
  string user_id = 1;
  string wave_id = 2;
}

message WaveProgressResponse {
  string status = 1;
  int32 attempts_count = 2;
  int32 highest_score = 3;
  int64 completed_at_unix = 4;
  int64 last_attempted_at_unix = 5;
  string error = 6;
}

message GetCourseProgressRequest {
  string user_id = 1;
  string course_id = 2;
}

message LessonProgress {
  string lesson_id = 1;
  int32 completed_waves = 2;
  int32 total_waves = 3;
}

message CourseProgressResponse {
  int32 completed_waves = 1;
  int32 total_waves = 2;
  int64 started_at_unix = 3;
  int64 completed_at_unix = 4;
  repeated LessonProgress lesson_progress = 5;
  string error = 6;
}

message IsEnrolledRequest {
  string user_id = 1;
  string course_id = 2;
}

message IsEnrolledResponse {
  bool enrolled = 1;
  string error = 2;
}

message ListEnrollmentsRequest {
  string user_id = 1;
}

message ListEnrollmentsResponse {
  repeated Enrollment enrollments = 1;
  string error = 2;
}

service ProgressService {
  rpc EnrollInCourse(EnrollRequest) returns (EnrollResponse);
  rpc RecordAttempt(RecordAttemptRequest) returns (RecordAttemptResponse);
  rpc GetWaveProgress(GetWaveProgressRequest) returns (WaveProgressResponse);
  rpc GetCourseProgress(GetCourseProgressRequest) returns (CourseProgressResponse);
  rpc IsEnrolled(IsEnrolledRequest) returns (IsEnrolledResponse);
  rpc ListEnrollments(ListEnrollmentsRequest) returns (ListEnrollmentsResponse);
}
