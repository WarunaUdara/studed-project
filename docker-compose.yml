services:
  postgres:
    image: postgres:15-alpine
    container_name: studed-postgres
    environment:
      POSTGRES_USER: studed
      POSTGRES_PASSWORD: studed
      POSTGRES_DB: studed
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "studed", "-d", "studed"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: studed-redis
    ports:
      - "6379:6379"

  elasticsearch:
    build:
      context: infra/docker/elasticsearch
    container_name: studed-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: studed-auth-service
    environment:
      AUTH_SERVICE_ADDR: :8081
      DATABASE_URL: postgres://studed:studed@postgres:5432/studed?sslmode=disable
      JWT_ACCESS_SECRET: change-me-access-secret-min-32-bytes-long
      JWT_REFRESH_SECRET: change-me-refresh-secret-min-32-bytes-long
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 168h
    ports:
      - "8081:8081"
      - "8085:8085"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8085/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  course-service:
    build:
      context: .
      dockerfile: services/course-service/Dockerfile
    container_name: studed-course-service
    environment:
      COURSE_SERVICE_ADDR: :8083
      DATABASE_URL: postgres://studed:studed@postgres:5432/studed?sslmode=disable
      AUTH_SERVICE_ADDR: auth-service:8081
      ELASTICSEARCH_URL: http://elasticsearch:9200
    ports:
      - "8083:8083"
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      elasticsearch:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8084/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  progress-service:
    build:
      context: .
      dockerfile: services/progress-service/Dockerfile
    container_name: studed-progress-service
    environment:
      PROGRESS_SERVICE_ADDR: :8086
      DATABASE_URL: postgres://studed:studed@postgres:5432/studed?sslmode=disable
      COURSE_SERVICE_ADDR: course-service:8083
      GAMIFICATION_SERVICE_ADDR: gamification-service:8088
    ports:
      - "8086:8086"
      - "8087:8087"
    depends_on:
      postgres:
        condition: service_healthy
      course-service:
        condition: service_healthy
      gamification-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8087/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  gamification-service:
    build:
      context: .
      dockerfile: services/gamification-service/Dockerfile
    container_name: studed-gamification-service
    environment:
      GAMIFICATION_SERVICE_ADDR: :8088
      DATABASE_URL: postgres://studed:studed@postgres:5432/studed?sslmode=disable
      REDIS_ADDR: redis:6379
    ports:
      - "8088:8088"
      - "8089:8089"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8089/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  ai-service:
    build:
      context: .
      dockerfile: services/ai-service/Dockerfile
    container_name: studed-ai-service
    environment:
      AI_SERVICE_ADDR: :8090
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  payment-service:
    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
    container_name: studed-payment-service
    environment:
      PAYMENT_SERVICE_ADDR: :8091
      DATABASE_URL: postgres://studed:studed@postgres:5432/studed?sslmode=disable
      PAYHERE_MERCHANT_ID: ${PAYHERE_MERCHANT_ID:-}
      PAYHERE_MERCHANT_SECRET: ${PAYHERE_MERCHANT_SECRET:-}
      PAYHERE_NOTIFY_URL: ${PAYHERE_NOTIFY_URL:-}
    ports:
      - "8091:8091"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8091/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: studed-api-gateway
    environment:
      API_GATEWAY_ADDR: :8080
      AUTH_SERVICE_ADDR: auth-service:8081
      COURSE_SERVICE_ADDR: course-service:8083
      PROGRESS_SERVICE_ADDR: progress-service:8086
      GAMIFICATION_SERVICE_ADDR: gamification-service:8088
      AI_SERVICE_URL: http://ai-service:8090
      PAYMENT_SERVICE_URL: http://payment-service:8091
      REDIS_ADDR: redis:6379
      JWT_ACCESS_SECRET: change-me-access-secret-min-32-bytes-long
      GRAPHQL_PLAYGROUND: "true"
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_started
      auth-service:
        condition: service_healthy
      course-service:
        condition: service_healthy
      progress-service:
        condition: service_healthy
      gamification-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  elasticsearch_data:
