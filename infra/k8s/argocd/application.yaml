apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: studed-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/WarunaUdara/studed-project.git'
    targetRevision: HEAD
    path: infra/k8s
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: studed
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
