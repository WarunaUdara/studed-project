apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: studed
  labels:
    app: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: studed-doc-api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: studed-config
            - secretRef:
                name: studed-secrets
          resources:
            requests:
              memory: "20Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "150m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: studed
spec:
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: api-gateway
